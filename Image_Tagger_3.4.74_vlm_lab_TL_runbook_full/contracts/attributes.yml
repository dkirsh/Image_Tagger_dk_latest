  - id: privacy.prospect
    name: Prospect (openness)
    level: inferred
    range: prob
    sources: {cv: true, vlm: true}
    notes: Long sightlines, low occlusion
  - id: greenery.plants_presence
    name: Plants presence
    level: visible
    range: prob
    sources: {cv: true, vlm: true}
    notes: Green hues with leaf-like textures or VLM confirmation

