# Room type (Places365 vision classifier)
- id: room.type_coarse
  name: Coarse room type (index)
  level: inferred
  range: ordinal
  sources: {cv: true, vlm: false}
  notes: Integer index into COARSE_CATEGORIES list in RoomDetectionAnalyzer. 13 categories including bedroom, kitchen, living, lobby, office, etc.

- id: room.type_coarse_confidence
  name: Coarse room type confidence
  level: inferred
  range: prob
  sources: {cv: true, vlm: false}
  notes: Softmax probability for top coarse category. Tag is emitted when >= 0.20.

- id: room.type_fine_confidence
  name: Fine room type confidence
  level: inferred
  range: prob
  sources: {cv: true, vlm: false}
  notes: Softmax probability for top Places365 fine-grained category.

- id: biophilia.index
  name: Biophilia Index
